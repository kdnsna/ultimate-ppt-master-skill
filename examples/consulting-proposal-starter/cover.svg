<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">咨询方案次级公开样例封面</title>
  <desc id="desc">先定义决策，再展开分析；展示三个方案的同尺比较。</desc>
  <rect width="1200" height="675" fill="#F6F3ED"/>
  <rect x="44" y="40" width="1112" height="595" rx="28" fill="#FFFDF8" stroke="#D9D4C9"/>
  <rect x="44" y="40" width="9" height="595" rx="4.5" fill="#1D4ED8"/>
  <g font-family="Noto Sans SC, Microsoft YaHei, sans-serif">
    <text x="92" y="104" fill="#1D4ED8" font-size="18" font-weight="700">咨询方案 · 次级公开样例</text>
    <g font-family="Noto Serif SC, SimSun, serif" fill="#171714" font-weight="600">
      <text x="92" y="208" font-size="66">先定义决策，</text>
      <text x="92" y="286" font-size="66">再展开分析。</text>
    </g>
    <text x="94" y="346" fill="#67675F" font-size="22">决策定义 → 同尺比较 → 明确推荐 → 实施路线</text>
    <g transform="translate(94 414)">
      <rect width="285" height="132" rx="20" fill="#F6F3ED" stroke="#D9D4C9"/>
      <text x="22" y="40" fill="#67675F" font-size="15">方案 A</text><text x="22" y="82" fill="#171714" font-size="27" font-weight="700">快速改善</text>
      <rect x="309" width="285" height="132" rx="20" fill="#E8EEF9" stroke="#9EB4EA"/>
      <text x="331" y="40" fill="#1D4ED8" font-size="15">推荐 · 方案 B</text><text x="331" y="82" fill="#171714" font-size="27" font-weight="700">增长专项</text>
      <rect x="618" width="285" height="132" rx="20" fill="#F6F3ED" stroke="#D9D4C9"/>
      <text x="640" y="40" fill="#67675F" font-size="15">方案 C</text><text x="640" y="82" fill="#171714" font-size="27" font-weight="700">旅程重构</text>
    </g>
  </g>
</svg>
