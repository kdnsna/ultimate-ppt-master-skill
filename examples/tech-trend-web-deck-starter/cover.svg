<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">科技趋势 Web Deck 次级公开样例封面</title>
  <desc id="desc">有用的生成是一条可检查链路，而不是黑箱。</desc>
  <rect width="1200" height="675" fill="#F6F3ED"/>
  <rect x="44" y="40" width="1112" height="595" rx="28" fill="#FFFDF8" stroke="#D9D4C9"/>
  <rect x="44" y="40" width="9" height="595" rx="4.5" fill="#73866C"/>
  <g font-family="Noto Sans SC, Microsoft YaHei, sans-serif">
    <text x="92" y="104" fill="#D9573B" font-size="18" font-weight="700">科技趋势 Web Deck · 次级公开样例</text>
    <g font-family="Noto Serif SC, SimSun, serif" fill="#171714" font-weight="600">
      <text x="92" y="208" font-size="62">有用的生成，</text>
      <text x="92" y="282" font-size="62">是一条链而不是黑箱。</text>
