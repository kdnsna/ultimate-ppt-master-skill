      <path d="M176 54H202" stroke="#73866C"/>
      <rect x="212" width="166" height="108" rx="18" fill="#F6F3ED" stroke="#D9D4C9"/><text x="236" y="63" fill="#171714">结构文本</text>
      <path d="M388 54H414" stroke="#73866C"/>
      <rect x="424" width="166" height="108" rx="18" fill="#E8ECE5"/><text x="448" y="63" fill="#73866C">本地交接</text>
      <path d="M600 54H626" stroke="#73866C"/>
      <rect x="636" width="166" height="108" rx="18" fill="#F7E8E2"/><text x="660" y="63" fill="#D9573B">质量门禁</text>
    </g>
