<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Executive Business Review starter proof</title>
  <desc id="desc">A clean executive review preview with KPI cards and action plan.</desc>
  <rect width="1200" height="675" fill="#f7f9fc"/>
  <rect x="56" y="56" width="1088" height="563" rx="22" fill="#ffffff" stroke="#d8e0ea"/>
  <text x="96" y="126" fill="#2563eb" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">EXECUTIVE BUSINESS REVIEW</text>
  <text x="96" y="190" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900">Growth is positive.</text>
  <text x="96" y="248" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900">Retention decides the next quarter.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="96" y="330" width="224" height="150" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="124" y="380" fill="#2563eb" font-size="18" font-weight="800">Revenue</text>
    <text x="124" y="440" fill="#172033" font-size="48" font-weight="900">12%</text>
    <rect x="352" y="330" width="224" height="150" rx="14" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="380" y="380" fill="#0f766e" font-size="18" font-weight="800">Retention</text>
    <text x="380" y="440" fill="#172033" font-size="48" font-weight="900">82%</text>
    <rect x="608" y="330" width="224" height="150" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="636" y="380" fill="#c2410c" font-size="18" font-weight="800">Margin</text>
    <text x="636" y="440" fill="#172033" font-size="48" font-weight="900">38%</text>
    <rect x="864" y="330" width="224" height="150" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="892" y="380" fill="#475569" font-size="18" font-weight="800">Pipeline</text>
    <text x="892" y="440" fill="#172033" font-size="48" font-weight="900">2.7x</text>
  </g>
  <text x="96" y="560" fill="#617085" font-family="Inter, Arial, sans-serif" font-size="22">Starter proof: KPI reality -> driver analysis -> owner-led action plan.</text>
</svg>

