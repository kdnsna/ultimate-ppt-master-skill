<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT Master agent connect flow</title>
  <desc id="desc">A four step flow from source files to the web hub, local bridge, agent skill, and final decks.</desc>
  <rect width="1200" height="520" rx="28" fill="#F7FAFC"/>
  <rect x="36" y="36" width="1128" height="448" rx="24" fill="#FFFFFF" stroke="#DDE7F0"/>
  <text x="72" y="90" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">From messy source material to production-ready decks</text>
  <text x="72" y="124" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="17">Web-first, local-first, Agent-ready. No hosted backend required.</text>

  <g transform="translate(72 176)">
    <rect width="210" height="220" rx="18" fill="#FFF7ED" stroke="#FDBA74"/>
    <circle cx="42" cy="44" r="20" fill="#FB923C"/>
    <text x="42" y="51" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">1</text>
    <text x="26" y="88" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Import</text>
    <text x="26" y="120" fill="#6B4B28" font-family="Inter, Arial, sans-serif" font-size="15">PDF, Word, PPTX</text>
    <text x="26" y="145" fill="#6B4B28" font-family="Inter, Arial, sans-serif" font-size="15">Excel, Markdown</text>
    <text x="26" y="170" fill="#6B4B28" font-family="Inter, Arial, sans-serif" font-size="15">URLs and rough notes</text>
    <rect x="26" y="192" width="118" height="8" rx="4" fill="#FDBA74"/>
  </g>

  <path d="M304 286H374" stroke="#9AA8BA" stroke-width="3" stroke-linecap="round"/>
  <path d="M362 272L378 286L362 300" stroke="#9AA8BA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(398 176)">
    <rect width="210" height="220" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
    <circle cx="42" cy="44" r="20" fill="#2563EB"/>
    <text x="42" y="51" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">2</text>
    <text x="26" y="88" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Shape brief</text>
    <text x="26" y="120" fill="#335C91" font-family="Inter, Arial, sans-serif" font-size="15">Scenario, audience</text>
    <text x="26" y="145" fill="#335C91" font-family="Inter, Arial, sans-serif" font-size="15">style, language</text>
    <text x="26" y="170" fill="#335C91" font-family="Inter, Arial, sans-serif" font-size="15">model preference</text>
    <rect x="26" y="192" width="144" height="8" rx="4" fill="#60A5FA"/>
  </g>

  <path d="M630 286H700" stroke="#9AA8BA" stroke-width="3" stroke-linecap="round"/>
  <path d="M688 272L704 286L688 300" stroke="#9AA8BA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(724 176)">
    <rect width="210" height="220" rx="18" fill="#ECFDF5" stroke="#86EFAC"/>
    <circle cx="42" cy="44" r="20" fill="#10B981"/>
    <text x="42" y="51" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">3</text>
    <text x="26" y="88" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Bridge</text>
    <text x="26" y="120" fill="#23684E" font-family="Inter, Arial, sans-serif" font-size="15">Parse locally on</text>
    <text x="26" y="145" fill="#23684E" font-family="Inter, Arial, sans-serif" font-size="15">127.0.0.1</text>
    <text x="26" y="170" fill="#23684E" font-family="Inter, Arial, sans-serif" font-size="15">write handoff kit</text>
    <rect x="26" y="192" width="156" height="8" rx="4" fill="#34D399"/>
  </g>

  <path d="M956 286H1026" stroke="#9AA8BA" stroke-width="3" stroke-linecap="round"/>
  <path d="M1014 272L1030 286L1014 300" stroke="#9AA8BA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1050 176)">
    <rect width="78" height="220" rx="18" fill="#172033"/>
    <text x="39" y="57" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">4</text>
    <text x="39" y="100" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Agent</text>
    <text x="39" y="126" text-anchor="middle" fill="#B9C6D6" font-family="Inter, Arial, sans-serif" font-size="13">Codex</text>
    <text x="39" y="150" text-anchor="middle" fill="#B9C6D6" font-family="Inter, Arial, sans-serif" font-size="13">Claude</text>
    <text x="39" y="174" text-anchor="middle" fill="#B9C6D6" font-family="Inter, Arial, sans-serif" font-size="13">Skill</text>
  </g>

  <g transform="translate(72 424)">
    <rect width="316" height="32" rx="16" fill="#EFF6FF"/>
    <circle cx="20" cy="16" r="5" fill="#2563EB"/>
    <text x="34" y="21" fill="#24476F" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Public web page for onboarding</text>
  </g>
  <g transform="translate(416 424)">
    <rect width="326" height="32" rx="16" fill="#ECFDF5"/>
    <circle cx="20" cy="16" r="5" fill="#10B981"/>
    <text x="34" y="21" fill="#23684E" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Local files stay on the user's machine</text>
  </g>
  <g transform="translate(770 424)">
    <rect width="292" height="32" rx="16" fill="#FEF2F2"/>
    <circle cx="20" cy="16" r="5" fill="#EF4444"/>
    <text x="34" y="21" fill="#7F2A2A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Editable PPTX and Web Deck output</text>
  </g>
</svg>
