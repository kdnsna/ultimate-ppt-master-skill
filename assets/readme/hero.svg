<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT Master v5.3.0 创意中文首图</title>
  <desc id="desc">中文为主的 README 首图，用更通俗、有韵味的方式呈现 Ultimate PPT Master：Best-effect brief 先自动扩写，再把一句话需求做成能开会、能修改、能交付的 PPT。</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="0.48" stop-color="#F5FAF7"/>
      <stop offset="1" stop-color="#FFF8F0"/>
    </linearGradient>
    <linearGradient id="inkLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.45" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="deckFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6F9FC"/>
    </linearGradient>
    <filter id="softShadow" x="-14%" y="-18%" width="128%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#172033" flood-opacity="0.13"/>
    </filter>
    <filter id="paperShadow" x="-12%" y="-16%" width="124%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#172033" flood-opacity="0.12"/>
    </filter>
    <pattern id="quietGrid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" fill="none" stroke="#172033" stroke-opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#pageBg)"/>
  <rect width="1600" height="900" fill="url(#quietGrid)"/>
  <path d="M96 712C268 610 397 740 560 636C723 532 830 452 1012 520C1194 588 1287 695 1504 574" fill="none" stroke="#2563EB" stroke-opacity="0.08" stroke-width="34" stroke-linecap="round"/>
  <path d="M96 760C284 658 433 788 598 692C762 596 882 544 1040 604C1198 664 1306 776 1504 660" fill="none" stroke="#F97316" stroke-opacity="0.08" stroke-width="28" stroke-linecap="round"/>

  <g font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, Arial, sans-serif">
    <g transform="translate(116 82)">
      <rect width="454" height="52" rx="26" fill="#FFFFFF" filter="url(#paperShadow)"/>
      <circle cx="33" cy="26" r="8" fill="#2563EB"/>
      <circle cx="60" cy="26" r="8" fill="#14B8A6"/>
      <circle cx="87" cy="26" r="8" fill="#F97316"/>
      <text x="118" y="33" fill="#516173" font-size="16" font-weight="850">Ultimate PPT Master v5.3.0</text>

      <text x="0" y="138" fill="#101828" font-size="68" font-weight="900">一句话，也能做成</text>
      <text x="0" y="214" fill="#101828" font-size="68" font-weight="900">一份像样的 PPT</text>
      <rect x="2" y="244" width="560" height="10" rx="5" fill="url(#inkLine)"/>
      <text x="0" y="304" fill="#2563EB" font-size="31" font-weight="900">Best-effect brief 先扩写，再下笔。</text>
      <text x="0" y="348" fill="#5B6B7E" font-size="21" font-weight="650">把需求、资料、参考风格和素材边界先捋顺，</text>
      <text x="0" y="384" fill="#5B6B7E" font-size="21" font-weight="650">再交付可编辑、可审阅、可复盘的办公成稿。</text>
    </g>

    <g transform="translate(114 494)" filter="url(#paperShadow)">
      <rect width="170" height="58" rx="29" fill="#FFFFFF"/>
      <text x="36" y="38" fill="#1D4ED8" font-size="20" font-weight="900">不问废话</text>
      <rect x="192" width="170" height="58" rx="29" fill="#FFFFFF"/>
      <text x="228" y="38" fill="#047857" font-size="20" font-weight="900">不堆元素</text>
      <rect x="384" width="170" height="58" rx="29" fill="#FFFFFF"/>
      <text x="420" y="38" fill="#C2410C" font-size="20" font-weight="900">不交死图</text>
    </g>

    <g transform="translate(866 82)" filter="url(#softShadow)">
      <rect x="0" y="42" width="560" height="430" rx="28" fill="#FFFFFF"/>
      <rect x="34" y="0" width="492" height="338" rx="24" fill="url(#deckFace)" stroke="#D9E2EC"/>
      <rect x="34" y="0" width="492" height="70" rx="24" fill="#101828"/>
      <text x="64" y="44" fill="#FFFFFF" font-size="22" font-weight="900">能开会的成稿</text>
      <text x="326" y="44" fill="#B8C4D4" font-size="16" font-weight="750">PPTX · Web 预览</text>

      <g transform="translate(70 104)">
        <text x="0" y="0" fill="#101828" font-size="40" font-weight="900">从想法到成稿</text>
        <text x="0" y="44" fill="#64748B" font-size="19" font-weight="700">不是把文字塞进模板，而是把观点讲顺、画面做稳。</text>
        <rect x="0" y="84" width="140" height="46" rx="23" fill="#DBEAFE"/>
        <text x="30" y="114" fill="#1D4ED8" font-size="18" font-weight="900">问清楚</text>
        <rect x="158" y="84" width="140" height="46" rx="23" fill="#CCFBF1"/>
        <text x="188" y="114" fill="#0F766E" font-size="18" font-weight="900">定风格</text>
        <rect x="316" y="84" width="140" height="46" rx="23" fill="#FFEDD5"/>
        <text x="346" y="114" fill="#C2410C" font-size="18" font-weight="900">做漂亮</text>
      </g>

      <g transform="translate(70 276)">
        <rect width="408" height="14" rx="7" fill="#E2E8F0"/>
        <rect width="286" height="14" rx="7" fill="url(#inkLine)"/>
      </g>
      <rect x="86" y="390" width="388" height="34" rx="17" fill="#F8FAFC"/>
      <text x="136" y="413" fill="#475569" font-size="16" font-weight="800">微软雅黑优先 · 官方素材优先 · GPT 画面不贴字</text>
    </g>

    <g transform="translate(748 518)">
      <g transform="rotate(-8 0 0)" filter="url(#paperShadow)">
        <rect width="214" height="118" rx="18" fill="#EFF6FF"/>
        <text x="26" y="42" fill="#1D4ED8" font-size="19" font-weight="900">先问三件事</text>
        <text x="26" y="76" fill="#355B91" font-size="16" font-weight="750">给谁看？</text>
        <text x="112" y="76" fill="#355B91" font-size="16" font-weight="750">想说服谁？</text>
      </g>
      <g transform="translate(178 36) rotate(6)" filter="url(#paperShadow)">
        <rect width="230" height="126" rx="18" fill="#ECFDF5"/>
        <text x="26" y="44" fill="#047857" font-size="19" font-weight="900">再定一口气</text>
        <text x="26" y="80" fill="#23684E" font-size="16" font-weight="750">正式稳重、科技简洁、宣传有感染力</text>
      </g>
      <g transform="translate(392 6) rotate(-4)" filter="url(#paperShadow)">
        <rect width="214" height="118" rx="18" fill="#FFF7ED"/>
        <text x="26" y="42" fill="#C2410C" font-size="19" font-weight="900">最后看得见</text>
        <text x="26" y="76" fill="#8A4B17" font-size="16" font-weight="750">图片能用，文字能改，审计留底</text>
      </g>
    </g>

    <g transform="translate(116 708)" filter="url(#softShadow)">
      <rect width="1368" height="106" rx="26" fill="#FFFFFF"/>
      <text x="38" y="43" fill="#101828" font-size="25" font-weight="900">一条更像真实办公的路：</text>
      <text x="306" y="43" fill="#5B6B7E" font-size="19" font-weight="750">bestEffectBrief → sourceConfidence → 画面成体系 → PPTX / Web Deck → 渲染审阅</text>
      <rect x="38" y="68" width="1292" height="10" rx="5" fill="#E2E8F0"/>
      <rect x="38" y="68" width="1038" height="10" rx="5" fill="url(#inkLine)"/>
    </g>
  </g>
</svg>
