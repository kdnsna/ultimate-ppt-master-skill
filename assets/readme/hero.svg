<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT Master v4.1.0 simplified Web console</title>
  <desc id="desc">A simplified four-step Web Experience showing one primary action, local connector, AI helper, and generated local project folder.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.56" stop-color="#F1F7F5"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.48" stop-color="#10B981"/>
      <stop offset="1" stop-color="#EF5B3F"/>
    </linearGradient>
    <filter id="softShadow" x="-12%" y="-16%" width="124%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#172033" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#172033" stroke-opacity="0.055"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect x="90" y="72" width="1420" height="756" rx="30" fill="#FFFFFF" opacity="0.72"/>

  <g transform="translate(124 96)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif">
    <rect width="438" height="48" rx="24" fill="#FFFFFF" filter="url(#softShadow)"/>
    <circle cx="30" cy="24" r="8" fill="#2563EB"/>
    <circle cx="56" cy="24" r="8" fill="#10B981"/>
    <circle cx="82" cy="24" r="8" fill="#EF5B3F"/>
    <text x="112" y="30" fill="#526173" font-size="15" font-weight="850">v4.1.0 Simplified Web console</text>

    <text x="0" y="122" fill="#172033" font-size="66" font-weight="950">Ultimate PPT Master</text>
    <text x="0" y="174" fill="#2563EB" font-size="34" font-weight="900">One next step. Four-step delivery.</text>
    <text x="0" y="224" fill="#5F6F84" font-size="22" font-weight="650">把资料整理成本地项目包，再交给 Codex / Hermes / OpenClaw / Claude Code 深加工。</text>
  </g>

  <g transform="translate(1032 102)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif" filter="url(#softShadow)">
    <rect width="362" height="172" rx="14" fill="#172033"/>
    <text x="28" y="42" fill="#FFFFFF" font-size="17" font-weight="900">Console first</text>
    <text x="28" y="72" fill="#B9C6D6" font-size="15" font-weight="720">一个主按钮</text>
    <text x="28" y="100" fill="#B9C6D6" font-size="15" font-weight="720">四步操作条</text>
    <text x="28" y="128" fill="#B9C6D6" font-size="15" font-weight="720">设置默认折叠</text>
    <text x="28" y="156" fill="#B9C6D6" font-size="15" font-weight="720">预览三组归类</text>
  </g>

  <g transform="translate(124 332)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif" filter="url(#softShadow)">
    <rect width="1352" height="404" rx="22" fill="#FFFFFF" stroke="#D7DEE8"/>
    <rect width="1352" height="58" rx="22" fill="#F8FAFC"/>
    <circle cx="32" cy="29" r="8" fill="#EF4444"/>
    <circle cx="58" cy="29" r="8" fill="#F59E0B"/>
    <circle cx="84" cy="29" r="8" fill="#10B981"/>
    <text x="118" y="36" fill="#607086" font-size="15" font-weight="850">ultimate-ppt-master / web experience</text>

    <g transform="translate(40 90)">
      <rect width="224" height="278" rx="14" fill="#EFF6FF" stroke="#BFDBFE"/>
      <circle cx="34" cy="36" r="18" fill="#2563EB"/>
      <text x="34" y="43" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="900">1</text>
      <text x="24" y="82" fill="#172033" font-size="24" font-weight="920">Prepare</text>
      <text x="24" y="116" fill="#355B91" font-size="16" font-weight="720">Write the task</text>
      <text x="24" y="142" fill="#355B91" font-size="16" font-weight="720">Keep one next step</text>
      <text x="24" y="168" fill="#355B91" font-size="16" font-weight="720">Fold advanced setup</text>
      <rect x="24" y="212" width="176" height="38" rx="8" fill="#2563EB"/>
      <text x="112" y="237" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="900">Open Web Experience</text>
    </g>

    <path d="M284 230H352" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
    <path d="M342 214L360 230L342 246" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(382 90)">
      <rect width="224" height="278" rx="14" fill="#ECFDF5" stroke="#A7F3D0"/>
      <circle cx="34" cy="36" r="18" fill="#10B981"/>
      <text x="34" y="43" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="900">2</text>
      <text x="24" y="82" fill="#172033" font-size="24" font-weight="920">Connect</text>
      <text x="24" y="116" fill="#23684E" font-size="16" font-weight="720">Local connector</text>
      <text x="24" y="142" fill="#23684E" font-size="16" font-weight="720">127.0.0.1 only</text>
      <text x="24" y="168" fill="#23684E" font-size="16" font-weight="720">No API key leaks</text>
      <rect x="24" y="212" width="176" height="38" rx="8" fill="#0F766E"/>
      <text x="112" y="237" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="900">npm run bridge</text>
    </g>

    <path d="M626 230H694" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
    <path d="M684 214L702 230L684 246" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(724 90)">
      <rect width="224" height="278" rx="14" fill="#FFF7ED" stroke="#FED7AA"/>
      <circle cx="34" cy="36" r="18" fill="#F97316"/>
      <text x="34" y="43" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="900">3</text>
      <text x="24" y="82" fill="#172033" font-size="24" font-weight="920">Deliver</text>
      <text x="24" y="116" fill="#8A4B17" font-size="16" font-weight="720">source.md</text>
      <text x="24" y="142" fill="#8A4B17" font-size="16" font-weight="720">manifest.json</text>
      <text x="24" y="168" fill="#8A4B17" font-size="16" font-weight="720">preview + QA</text>
      <rect x="24" y="212" width="176" height="38" rx="8" fill="#EA580C"/>
      <text x="112" y="237" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="900">Local project</text>
    </g>

    <path d="M968 230H1036" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
    <path d="M1026 214L1044 230L1026 246" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(1066 90)">
      <rect width="224" height="278" rx="14" fill="#F8FAFC" stroke="#D7DEE8"/>
      <circle cx="34" cy="36" r="18" fill="#172033"/>
      <text x="34" y="43" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="900">4</text>
      <text x="24" y="82" fill="#172033" font-size="24" font-weight="920">AI helper</text>
      <text x="24" y="116" fill="#526173" font-size="16" font-weight="720">Codex / Hermes</text>
      <text x="24" y="142" fill="#526173" font-size="16" font-weight="720">OpenClaw / Claude</text>
      <text x="24" y="168" fill="#526173" font-size="16" font-weight="720">Skill does final QA</text>
      <rect x="24" y="212" width="176" height="38" rx="8" fill="#172033"/>
      <text x="112" y="237" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="900">Produce PPTX / HTML</text>
    </g>
  </g>

  <g transform="translate(182 790)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif">
    <rect width="1236" height="56" rx="12" fill="#FFFFFF" filter="url(#softShadow)"/>
    <rect x="28" y="20" width="160" height="16" rx="8" fill="url(#brand)"/>
    <text x="214" y="35" fill="#172033" font-size="17" font-weight="850">Web shows one next step · local connector writes files · Agent Skill handles final quality</text>
  </g>
</svg>
