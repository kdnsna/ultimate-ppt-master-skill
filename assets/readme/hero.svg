<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT Master Web Experience and Agent Skill hero</title>
  <desc id="desc">A web-first workflow diagram showing a static prompt planner, an agent skill production loop, and editable PPTX plus Web Deck outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="0.45" stop-color="#F1F7F4"/>
      <stop offset="1" stop-color="#FFF7F0"/>
    </linearGradient>
    <linearGradient id="accentA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.48" stop-color="#10B981"/>
      <stop offset="1" stop-color="#EF5B3F"/>
    </linearGradient>
    <linearGradient id="accentB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6D5BD0"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-14%" width="124%" height="132%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#172033" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#172033" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <path d="M120 214H1480" stroke="url(#accentA)" stroke-width="16" stroke-linecap="round" opacity="0.18"/>
  <path d="M180 744H1420" stroke="url(#accentA)" stroke-width="16" stroke-linecap="round" opacity="0.14"/>

  <g transform="translate(100 70)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif">
    <rect width="414" height="46" rx="23" fill="#FFFFFF" opacity="0.88" filter="url(#shadow)"/>
    <circle cx="28" cy="23" r="8" fill="#2563EB"/>
    <circle cx="54" cy="23" r="8" fill="#10B981"/>
    <circle cx="80" cy="23" r="8" fill="#EF5B3F"/>
    <text x="110" y="29" fill="#526173" font-size="15" font-weight="850">v2.3.0 Agent Connect Studio</text>

    <text x="0" y="120" fill="#172033" font-size="64" font-weight="920">Ultimate PPT Master</text>
    <text x="0" y="171" fill="#2563EB" font-size="36" font-weight="900">Web Experience + Agent Skill</text>
    <text x="0" y="220" fill="#5F6F84" font-size="23" font-weight="650">Configure online. Produce locally. Export editable PPTX or Web Decks.</text>
    <text x="0" y="257" fill="#667085" font-size="21" font-weight="650">网页端生成工作流，Skill 执行生产级 PPT 工作。</text>
  </g>

  <g transform="translate(1130 86)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif" filter="url(#shadow)">
    <rect width="340" height="94" rx="8" fill="#FFFFFF"/>
    <text x="28" y="34" fill="#10B981" font-size="15" font-weight="900">STATIC MVP</text>
    <text x="28" y="62" fill="#172033" font-size="18" font-weight="800">No backend · No model hosting</text>
    <text x="28" y="84" fill="#667085" font-size="14" font-weight="700">Prompt generation stays in browser</text>
  </g>

  <g transform="translate(98 332)" filter="url(#shadow)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif">
    <rect width="1404" height="438" rx="8" fill="#FFFFFF" opacity="0.94" stroke="#D7DEE8"/>
    <rect width="1404" height="54" rx="8" fill="#F8FAFC"/>
    <circle cx="32" cy="27" r="8" fill="#EF4444"/>
    <circle cx="58" cy="27" r="8" fill="#F59E0B"/>
    <circle cx="84" cy="27" r="8" fill="#10B981"/>
    <text x="118" y="34" fill="#607086" font-size="15" font-weight="850">ultimate-ppt-master web experience</text>

    <g transform="translate(44 92)">
      <text x="0" y="0" fill="#2563EB" font-size="15" font-weight="900">1 · OPEN WEB EXPERIENCE</text>
      <text x="0" y="46" fill="#172033" font-size="34" font-weight="920">Prompt planner</text>
      <text x="0" y="80" fill="#667085" font-size="18" font-weight="650">Choose source, scenario, output, style, language, agent, and model preference.</text>
      <rect x="0" y="116" width="380" height="178" rx="8" fill="#F8FAFC" stroke="#D7DEE8"/>
      <g transform="translate(24 142)" font-size="14" font-weight="850">
        <rect width="148" height="38" rx="8" fill="#EFF6FF"/>
        <text x="18" y="25" fill="#2563EB">DOCX / PDF</text>
        <rect x="168" width="156" height="38" rx="8" fill="#ECFDF5"/>
        <text x="186" y="25" fill="#047857">Executive</text>
        <rect y="58" width="148" height="38" rx="8" fill="#FFF7ED"/>
        <text x="18" y="83" fill="#C2410C">PPTX + Web</text>
        <rect x="168" y="58" width="156" height="38" rx="8" fill="#F5F3FF"/>
        <text x="186" y="83" fill="#6D5BD0">Codex</text>
      </g>
      <rect x="24" y="260" width="232" height="10" rx="5" fill="url(#accentA)"/>
    </g>

    <path d="M464 232H584" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
    <path d="M584 232l-22-18M584 232l-22 18" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>

    <g transform="translate(612 92)">
      <text x="0" y="0" fill="#10B981" font-size="15" font-weight="900">2 · INSTALL / USE AS AGENT SKILL</text>
      <text x="0" y="46" fill="#172033" font-size="34" font-weight="920">Production loop</text>
      <text x="0" y="80" fill="#667085" font-size="18" font-weight="650">Agent reads files, runs scripts, previews, repairs, and lists final outputs.</text>
      <rect x="0" y="116" width="348" height="178" rx="8" fill="#F0FDF4" stroke="#BDEED8"/>
      <text x="24" y="154" fill="#14532D" font-size="17" font-weight="900">AGENTS.md + SKILL.md</text>
      <g fill="none" stroke="#10B981" stroke-width="8" stroke-linecap="round">
        <path d="M30 190H236"/>
        <path d="M30 225H286"/>
        <path d="M30 260H176"/>
      </g>
      <rect x="224" y="214" width="78" height="44" rx="8" fill="#FFFFFF"/>
      <text x="244" y="242" fill="#047857" font-size="14" font-weight="900">verify</text>
    </g>

    <path d="M1000 232H1120" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
    <path d="M1120 232l-22-18M1120 232l-22 18" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>

    <g transform="translate(1148 92)">
      <text x="0" y="0" fill="#EF5B3F" font-size="15" font-weight="900">3 · EXPORT</text>
      <text x="0" y="46" fill="#172033" font-size="34" font-weight="920">Final decks</text>
      <text x="0" y="80" fill="#667085" font-size="18" font-weight="650">Editable files for teams and high-visual web decks for sharing.</text>
      <rect x="0" y="116" width="210" height="78" rx="8" fill="#FFF7ED" stroke="#FED7AA"/>
      <rect x="24" y="139" width="44" height="32" rx="6" fill="url(#warm)"/>
      <text x="86" y="158" fill="#172033" font-size="19" font-weight="900">PPTX</text>
      <text x="86" y="180" fill="#667085" font-size="13" font-weight="750">Editable</text>
      <rect x="0" y="216" width="210" height="78" rx="8" fill="#EFF6FF" stroke="#BFDBFE"/>
      <rect x="24" y="239" width="44" height="32" rx="6" fill="url(#accentB)"/>
      <text x="86" y="258" fill="#172033" font-size="19" font-weight="900">Web Deck</text>
      <text x="86" y="280" fill="#667085" font-size="13" font-weight="750">Single HTML</text>
    </g>
  </g>

  <g transform="translate(182 810)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif">
    <rect width="1236" height="54" rx="8" fill="#FFFFFF" opacity="0.9" filter="url(#shadow)"/>
    <text x="36" y="34" fill="#172033" font-size="17" font-weight="850">Primary: Open Web Experience · Second core: Install / Use as Agent Skill · Later: Desktop local preview and signed distribution</text>
  </g>
</svg>
