<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT Master Desktop hero</title>
  <desc id="desc">A colorful premium desktop product hero showing an AI PPT studio that imports source files and generates editable PPTX or web decks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF8EC"/>
      <stop offset="0.38" stop-color="#F4F8FF"/>
      <stop offset="0.7" stop-color="#F7F0FF"/>
      <stop offset="1" stop-color="#FFF3E8"/>
    </linearGradient>
    <linearGradient id="ribbonA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="0.34" stop-color="#FACC15"/>
      <stop offset="0.68" stop-color="#10B981"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="ribbonB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.54" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="appChrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#F7FBFF" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A4C"/>
      <stop offset="1" stop-color="#E11D48"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="0.52" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-18%" width="130%" height="142%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#42526E" flood-opacity="0.22"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#334155" flood-opacity="0.14"/>
    </filter>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#475569" opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#dots)" opacity="0.75"/>
  <path d="M-80 184C210 38 384 96 560 196C770 316 948 286 1136 164C1314 48 1478 58 1690 150" fill="none" stroke="url(#ribbonA)" stroke-width="42" stroke-linecap="round" opacity="0.18"/>
  <path d="M-70 752C170 626 392 610 610 718C826 824 1030 818 1228 696C1394 594 1518 596 1670 670" fill="none" stroke="url(#ribbonB)" stroke-width="48" stroke-linecap="round" opacity="0.15"/>

  <g transform="translate(100 66)">
    <rect width="360" height="44" rx="22" fill="#FFFFFF" opacity="0.78" filter="url(#softShadow)"/>
    <circle cx="28" cy="22" r="8" fill="#F97316"/>
    <circle cx="54" cy="22" r="8" fill="#FACC15"/>
    <circle cx="80" cy="22" r="8" fill="#10B981"/>
    <text x="108" y="28" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif" font-size="15" font-weight="800" fill="#526173">v2.0.0 Desktop Release</text>

    <text x="0" y="112" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif" font-size="58" font-weight="900" fill="#172033">Ultimate PPT Master Desktop</text>
    <text x="0" y="160" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif" font-size="35" font-weight="900" fill="#7C3AED">终极融合 PPT 大师桌面端</text>
    <text x="0" y="208" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif" font-size="23" font-weight="650" fill="#596579">Drag real files in. Generate editable PPTX or cinematic Web Decks.</text>
    <text x="0" y="244" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif" font-size="21" font-weight="650" fill="#6B7280">拖入真实资料，生成可编辑 PowerPoint 或高质感网页演示。</text>
  </g>

  <g transform="translate(1010 86)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif" filter="url(#softShadow)">
    <rect width="442" height="76" rx="30" fill="#FFFFFF" opacity="0.82"/>
    <text x="32" y="31" font-size="16" font-weight="900" fill="#F97316">LOCAL-FIRST AI PPT STUDIO</text>
    <text x="32" y="56" font-size="17" font-weight="750" fill="#172033">No cloud upload by default · Agent-ready</text>
  </g>

  <g transform="translate(128 338)" filter="url(#shadow)">
    <rect width="1344" height="478" rx="44" fill="url(#appChrome)" stroke="#FFFFFF" stroke-width="2"/>
    <rect width="1344" height="58" rx="44" fill="#FFFFFF" opacity="0.72"/>
    <circle cx="36" cy="30" r="9" fill="#FF6B57"/>
    <circle cx="64" cy="30" r="9" fill="#FFCA3A"/>
    <circle cx="92" cy="30" r="9" fill="#25C27A"/>
    <text x="124" y="37" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="800" fill="#6B7280">Ultimate PPT Master Desktop</text>

    <g transform="translate(30 82)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif">
      <rect width="238" height="360" rx="28" fill="#FFFFFF" opacity="0.82" stroke="#E6ECF5"/>
      <rect x="26" y="26" width="58" height="58" rx="18" fill="url(#ribbonB)"/>
      <text x="104" y="50" font-size="18" font-weight="900" fill="#172033">Creator</text>
      <text x="104" y="76" font-size="14" font-weight="700" fill="#667085">Desktop shell</text>

      <g transform="translate(24 118)">
        <rect width="188" height="44" rx="16" fill="#FFF7ED"/>
        <text x="16" y="28" font-size="15" font-weight="850" fill="#C2410C">Projects</text>
        <rect y="58" width="188" height="44" rx="16" fill="#FFFFFF"/>
        <text x="16" y="86" font-size="15" font-weight="850" fill="#667085">Create</text>
        <rect y="116" width="188" height="44" rx="16" fill="#FFFFFF"/>
        <text x="16" y="144" font-size="15" font-weight="850" fill="#667085">Workbench</text>
        <rect y="174" width="188" height="44" rx="16" fill="#FFFFFF"/>
        <text x="16" y="202" font-size="15" font-weight="850" fill="#667085">Settings</text>
      </g>

      <rect x="24" y="300" width="188" height="38" rx="16" fill="#ECFDF5"/>
      <text x="42" y="324" font-size="14" font-weight="850" fill="#047857">Provider ready</text>
    </g>

    <g transform="translate(300 82)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif">
      <text x="0" y="26" font-size="16" font-weight="900" fill="#F97316">STEP 1</text>
      <text x="0" y="64" font-size="34" font-weight="900" fill="#172033">Import real sources</text>
      <text x="0" y="96" font-size="20" font-weight="750" fill="#667085">导入真实资料</text>

      <rect y="132" width="310" height="228" rx="30" fill="#FFF8EC" stroke="#FED7AA"/>
      <path d="M52 180h206M52 216h154M52 252h190M52 288h122" stroke="#F97316" stroke-width="13" stroke-linecap="round" opacity="0.72"/>
      <g transform="translate(36 36)" font-size="16" font-weight="900">
        <rect x="0" y="278" width="68" height="40" rx="14" fill="#FFFFFF"/>
        <text x="18" y="304" fill="#C2410C">PDF</text>
        <rect x="82" y="278" width="76" height="40" rx="14" fill="#FFFFFF"/>
        <text x="99" y="304" fill="#2563EB">DOCX</text>
        <rect x="172" y="278" width="74" height="40" rx="14" fill="#FFFFFF"/>
        <text x="190" y="304" fill="#047857">URL</text>
      </g>
    </g>

    <g transform="translate(652 82)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif">
      <text x="0" y="26" font-size="16" font-weight="900" fill="#7C3AED">STEP 2</text>
      <text x="0" y="64" font-size="34" font-weight="900" fill="#172033">Choose delivery</text>
      <text x="0" y="96" font-size="20" font-weight="750" fill="#667085">选择交付场景</text>

      <rect y="132" width="318" height="96" rx="28" fill="#FFF7ED" stroke="#FDBA74"/>
      <rect x="26" y="158" width="48" height="48" rx="16" fill="url(#hot)"/>
      <text x="94" y="170" font-size="19" font-weight="900" fill="#172033">Editable PPTX</text>
      <text x="94" y="198" font-size="15" font-weight="750" fill="#667085">Formal handoff · 可继续修改</text>

      <rect y="264" width="318" height="96" rx="28" fill="#EEF6FF" stroke="#93C5FD"/>
      <rect x="26" y="290" width="48" height="48" rx="16" fill="url(#cool)"/>
      <text x="94" y="302" font-size="19" font-weight="900" fill="#172033">Web Deck</text>
      <text x="94" y="330" font-size="15" font-weight="750" fill="#667085">Keynote sharing · 高质感演示</text>
    </g>

    <g transform="translate(1010 82)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif">
      <text x="0" y="26" font-size="16" font-weight="900" fill="#10B981">STEP 3</text>
      <text x="0" y="64" font-size="34" font-weight="900" fill="#172033">Generate &amp; export</text>
      <text x="0" y="96" font-size="20" font-weight="750" fill="#667085">生成、预览、导出</text>

      <rect y="132" width="284" height="228" rx="30" fill="#FFFFFF" stroke="#D9E3F0"/>
      <rect x="28" y="154" width="228" height="84" rx="24" fill="#172033"/>
      <rect x="50" y="180" width="92" height="12" rx="6" fill="#FACC15"/>
      <rect x="50" y="204" width="160" height="12" rx="6" fill="#94A3B8"/>
      <rect x="28" y="260" width="102" height="42" rx="16" fill="#ECFDF5"/>
      <text x="48" y="287" font-size="14" font-weight="900" fill="#047857">Preview</text>
      <rect x="146" y="260" width="110" height="42" rx="16" fill="#EFF6FF"/>
      <text x="166" y="287" font-size="14" font-weight="900" fill="#2563EB">Export</text>
    </g>
  </g>

  <g transform="translate(210 824)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif">
    <rect width="1180" height="50" rx="25" fill="#FFFFFF" opacity="0.72" filter="url(#softShadow)"/>
    <text x="40" y="32" font-size="17" font-weight="850" fill="#172033">Desktop-first · Editable PPTX · Magazine Web Deck · Local projects · Codex / Claude Code / OpenClaw / Hermes ready</text>
  </g>
</svg>
