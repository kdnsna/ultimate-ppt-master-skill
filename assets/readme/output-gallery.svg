    <text x="24" y="220" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Single-file Web Deck</text>
    <text x="24" y="248" fill="#4C4A8A" font-family="Inter, Arial, sans-serif" font-size="14">For launches, demos,</text>
    <text x="24" y="270" fill="#4C4A8A" font-family="Inter, Arial, sans-serif" font-size="14">visual stories, and public</text>
    <text x="24" y="292" fill="#4C4A8A" font-family="Inter, Arial, sans-serif" font-size="14">sharing without PowerPoint.</text>
  </g>

  <g transform="translate(800 188)">
    <rect width="318" height="302" rx="20" fill="#ECFDF5" stroke="#86EFAC"/>
