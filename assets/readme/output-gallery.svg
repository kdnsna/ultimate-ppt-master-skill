    <rect x="44" y="136" width="208" height="18" rx="9" fill="#DCFCE7"/>
    <text x="24" y="220" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Agent Skill Workflow</text>
    <text x="24" y="248" fill="#23684E" font-family="Inter, Arial, sans-serif" font-size="14">For deep production:</text>
    <text x="24" y="270" fill="#23684E" font-family="Inter, Arial, sans-serif" font-size="14">read files, run scripts,</text>
    <text x="24" y="292" fill="#23684E" font-family="Inter, Arial, sans-serif" font-size="14">preview, fix, and export.</text>
