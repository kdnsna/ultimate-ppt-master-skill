    <rect x="44" y="102" width="168" height="10" rx="5" fill="#CBD5E1"/>
    <rect x="44" y="132" width="90" height="26" rx="13" fill="#FB923C"/>
    <path d="M174 128L260 72V158H174V128Z" fill="#FFE8D2"/>
    <text x="24" y="220" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Editable PPTX</text>
    <text x="24" y="248" fill="#7C4A1D" font-family="Inter, Arial, sans-serif" font-size="14">For board decks, reports,</text>
    <text x="24" y="270" fill="#7C4A1D" font-family="Inter, Arial, sans-serif" font-size="14">consulting, training, and</text>
    <text x="24" y="292" fill="#7C4A1D" font-family="Inter, Arial, sans-serif" font-size="14">anything people must edit.</text>
  </g>

  <g transform="translate(441 188)">
    <rect width="318" height="302" rx="20" fill="#EEF2FF" stroke="#A5B4FC"/>
    <rect x="24" y="28" width="270" height="152" rx="14" fill="#172033"/>
