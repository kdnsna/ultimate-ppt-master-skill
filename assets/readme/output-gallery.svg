    <text x="73" y="91" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">S</text>
    <rect x="120" y="54" width="132" height="12" rx="6" fill="#10B981"/>
    <rect x="120" y="82" width="98" height="10" rx="5" fill="#CBD5E1"/>
