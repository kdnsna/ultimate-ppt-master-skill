    <text x="44" y="92" fill="#FFFFFF" font-family="Georgia, serif" font-size="28" font-weight="700">Magazine</text>
    <text x="44" y="124" fill="#FFFFFF" font-family="Georgia, serif" font-size="28" font-weight="700">Web Deck</text>
    <rect x="194" y="48" width="70" height="88" rx="10" fill="#F8FAFC"/>
    <rect x="206" y="64" width="46" height="8" rx="4" fill="#6366F1"/>
    <rect x="206" y="84" width="34" height="8" rx="4" fill="#CBD5E1"/>
