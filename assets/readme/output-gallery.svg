<svg width="1200" height="610" viewBox="0 0 1200 610" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Output gallery</title>
  <desc id="desc">A gallery of editable PPTX, magazine web deck, and skill workflow outputs.</desc>
  <rect width="1200" height="610" rx="28" fill="#F4F7FB"/>
  <rect x="48" y="48" width="1104" height="514" rx="24" fill="#FFFFFF" stroke="#DDE7F0"/>
  <text x="82" y="108" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Choose the output route that matches the job</text>
  <text x="82" y="140" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">Fast public demo, private local intake, or deep Skill production can share the same source brief.</text>

  <g transform="translate(82 188)">
    <rect width="318" height="302" rx="20" fill="#FFF7ED" stroke="#FDBA74"/>
    <rect x="24" y="28" width="270" height="152" rx="14" fill="#FFFFFF" stroke="#FED7AA"/>
