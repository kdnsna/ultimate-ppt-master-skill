<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT Master Desktop interface showcase</title>
  <desc id="desc">Four colorful interface cards showing Projects, Create, Workbench, and Settings views of the desktop application.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF8EC"/>
      <stop offset="0.45" stop-color="#F4F8FF"/>
      <stop offset="1" stop-color="#FFF3E8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="0.36" stop-color="#10B981"/>
      <stop offset="0.72" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-15%" width="124%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#475569" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif">
    <text x="92" y="92" font-size="44" font-weight="900" fill="#172033">Four screens, one focused creator loop</text>
    <text x="92" y="134" font-size="22" font-weight="700" fill="#667085">普通创作者一眼会用，专业用户一眼信任。</text>
  </g>
  <rect x="92" y="172" width="1416" height="10" rx="5" fill="url(#accent)" opacity="0.72"/>

  <g transform="translate(92 232)" filter="url(#shadow)" font-family="Inter, Helvetica, Arial, PingFang SC, sans-serif">
    <g>
      <rect width="666" height="242" rx="34" fill="#FFFFFF" opacity="0.92"/>
      <text x="34" y="52" font-size="18" font-weight="900" fill="#F97316">PROJECTS</text>
      <text x="34" y="90" font-size="30" font-weight="900" fill="#172033">Recent projects + gallery</text>
      <text x="34" y="124" font-size="18" font-weight="700" fill="#667085">Reads real desktop manifests, then offers use-case starters.</text>
      <rect x="34" y="158" width="170" height="48" rx="18" fill="#FFF7ED"/>
      <text x="58" y="188" font-size="16" font-weight="900" fill="#C2410C">Business</text>
      <rect x="222" y="158" width="170" height="48" rx="18" fill="#EFF6FF"/>
      <text x="246" y="188" font-size="16" font-weight="900" fill="#2563EB">Consulting</text>
      <rect x="410" y="158" width="170" height="48" rx="18" fill="#ECFDF5"/>
      <text x="434" y="188" font-size="16" font-weight="900" fill="#047857">Swiss</text>
    </g>

    <g transform="translate(750 0)">
      <rect width="666" height="242" rx="34" fill="#FFFFFF" opacity="0.92"/>
      <text x="34" y="52" font-size="18" font-weight="900" fill="#7C3AED">CREATE</text>
      <text x="34" y="90" font-size="30" font-weight="900" fill="#172033">Import, recommend, choose</text>
      <text x="34" y="124" font-size="18" font-weight="700" fill="#667085">Drag source material, then let smart defaults reduce choices.</text>
      <rect x="34" y="158" width="260" height="48" rx="18" fill="#F5F3FF"/>
      <text x="58" y="188" font-size="16" font-weight="900" fill="#6D28D9">Recommended: PPTX</text>
      <rect x="314" y="158" width="260" height="48" rx="18" fill="#FFF7ED"/>
      <text x="338" y="188" font-size="16" font-weight="900" fill="#C2410C">Generate</text>
    </g>

    <g transform="translate(0 316)">
      <rect width="666" height="242" rx="34" fill="#FFFFFF" opacity="0.92"/>
      <text x="34" y="52" font-size="18" font-weight="900" fill="#10B981">WORKBENCH</text>
      <text x="34" y="90" font-size="30" font-weight="900" fill="#172033">Preview, checks, output files</text>
      <text x="34" y="124" font-size="18" font-weight="700" fill="#667085">Progress, preview surface, export panel, logs, and Agent handoff.</text>
      <rect x="34" y="160" width="224" height="18" rx="9" fill="#10B981"/>
      <rect x="34" y="194" width="430" height="18" rx="9" fill="#DCE7F5"/>
      <rect x="488" y="152" width="118" height="58" rx="20" fill="#ECFDF5"/>
      <text x="514" y="188" font-size="16" font-weight="900" fill="#047857">Export</text>
    </g>

    <g transform="translate(750 316)">
      <rect width="666" height="242" rx="34" fill="#FFFFFF" opacity="0.92"/>
      <text x="34" y="52" font-size="18" font-weight="900" fill="#2563EB">SETTINGS</text>
      <text x="34" y="90" font-size="30" font-weight="900" fill="#172033">Language + model setup</text>
      <text x="34" y="124" font-size="18" font-weight="700" fill="#667085">Chinese / English UI, provider status, local env checks.</text>
      <rect x="34" y="158" width="156" height="48" rx="18" fill="#EFF6FF"/>
      <text x="62" y="188" font-size="16" font-weight="900" fill="#2563EB">English</text>
      <rect x="210" y="158" width="156" height="48" rx="18" fill="#FFF7ED"/>
      <text x="252" y="188" font-size="16" font-weight="900" fill="#C2410C">中文</text>
      <rect x="386" y="158" width="188" height="48" rx="18" fill="#ECFDF5"/>
      <text x="414" y="188" font-size="16" font-weight="900" fill="#047857">Provider OK</text>
    </g>
  </g>
</svg>
