<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ultimate PPT Master v6.3.6 双案例</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 1440px; height: 810px; margin: 0; overflow: hidden; }
    body {
      color: #171714;
      background: #f6f3ed;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    main {
      width: 1344px;
      height: 738px;
      margin: 36px 48px;
      padding: 26px 28px 18px;
      position: relative;
      border: 1px solid #d8d1c5;
      border-radius: 28px;
      background: #fffdf8;
    }
    main::before {
      width: 7px;
      content: "";
      position: absolute;
      inset: 16px auto 16px -1px;
      border-radius: 999px;
      background: #1d4ed8;
    }
    .eyebrow { margin: 0 0 7px; color: #1d4ed8; font-size: 16px; font-weight: 800; letter-spacing: .02em; }
    h1 { margin: 0 0 16px; font-family: "Noto Serif SC", "Songti SC", serif; font-size: 39px; font-weight: 500; line-height: 1.12; }
    .cases { height: 548px; display: grid; grid-template-columns: 1fr 1fr; gap: 36px; }
    article {
      min-width: 0;
      padding: 18px 20px 16px;
      display: grid;
      grid-template-rows: 330px auto;
      gap: 13px;
      border: 1px solid #d9d2c7;
      border-radius: 24px;
      background: #fff;
    }
    .visual {
      min-width: 0;
      padding: 14px;
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: #f3f0e9;
    }
    .visual img { width: 100%; height: 100%; display: block; object-fit: contain; border-radius: 12px; }
    .tag {
      padding: 8px 12px;
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      background: #e8eefc;
      color: #1d4ed8;
    }
    article:last-child .tag { color: #b9412c; background: #fae9e3; }
    .meta { display: grid; align-content: start; }
    .number { margin: 0 0 6px; color: #1d4ed8; font-size: 14px; font-weight: 900; letter-spacing: .03em; }
    article:last-child .number { color: #d9573b; }
    h2 { margin: 0 0 6px; font-family: "Noto Serif SC", "Songti SC", serif; font-size: 28px; font-weight: 600; }
    .facts { margin: 0; color: #66635e; font-size: 15px; line-height: 1.5; }
    .rule { width: 210px; height: 8px; margin-top: 12px; border-radius: 999px; background: #1d4ed8; }
    article:last-child .rule { background: #d9573b; }
    footer {
      height: 30px;
      margin-top: 12px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      border-top: 1px solid #ded7cc;
      color: #171714;
      font-size: 14px;
      font-weight: 750;
    }
    footer span:last-child { color: #73866c; }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">ULTIMATE PPT MASTER · V6.3.6 正式版本</p>
    <h1>先看成品，再看交付证据</h1>
    <section class="cases">
      <article>
        <div class="visual">
          <span class="tag">可编辑 PPTX</span>
          <img src="../../examples/executive-business-review-starter/cover.svg" alt="正式办公 PPTX 封面">
        </div>
        <div class="meta">
          <p class="number">01 / FORMAL DELIVERY</p>
          <h2>正式办公：季度经营复盘</h2>
          <p class="facts">9 页 · 226 个原生矢量对象 · 2 图表 · 2 表格 · 9 页备注</p>
          <div class="rule"></div>
        </div>
      </article>
      <article>
        <div class="visual">
          <span class="tag">AI Web Deck</span>
          <img src="../../apps/web/public/benchmark/previews/gpt-5-6.png" alt="GPT-5.6 三种轨道 Web Deck">
        </div>
        <div class="meta">
          <p class="number">02 / EDITORIAL STORY</p>
          <h2>公开 AI：GPT-5.6 · 三种轨道</h2>
          <p class="facts">9 页 Web Deck · 桌面 / 390px · 官方资料核对至 2026-07-15</p>
          <div class="rule"></div>
        </div>
      </article>
    </section>
    <footer><span>输入 → 策划 → 输出 → 质量复核</span><span>本地生成 · 非云端托管</span></footer>
  </main>
</body>
</html>
