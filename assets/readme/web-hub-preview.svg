<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT Master Web Experience v2.5.0 preview</title>
  <desc id="desc">A preview of the beginner-friendly Web Experience with menu pages, glossary cards, one-click checks, and local project handoff.</desc>
  <rect width="1200" height="640" rx="28" fill="#F4F7FB"/>
  <rect x="42" y="42" width="1116" height="556" rx="24" fill="#FFFFFF" stroke="#D9E3EE"/>
  <rect x="42" y="42" width="1116" height="62" rx="24" fill="#172033"/>
  <circle cx="78" cy="73" r="8" fill="#FF6B6B"/>
  <circle cx="104" cy="73" r="8" fill="#FFD166"/>
