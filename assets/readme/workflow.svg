<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT Master workflow</title>
  <desc id="desc">A source-grounded workflow from research material through strategy, design, generation, verification, and export.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF7F0"/>
      <stop offset="1" stop-color="#ECE7DD"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0B0E14"/>
      <stop offset="1" stop-color="#273142"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-20%" width="124%" height="145%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1B1B1B" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="720" fill="url(#bg)"/>
  <g font-family="Inter, Helvetica, Arial, sans-serif">
    <text x="90" y="98" fill="#0B0E14" font-size="42" font-weight="800">Built for the way real decks are made</text>
    <text x="90" y="142" fill="#657080" font-size="21">Research, structure, design, verify, then export. Not a one-shot slide toy.</text>
  </g>

  <g transform="translate(86 232)" filter="url(#shadow)" font-family="Inter, Helvetica, Arial, sans-serif">
    <g>
      <rect width="210" height="220" rx="24" fill="#FFFFFF"/>
      <text x="30" y="56" fill="#0B0E14" font-size="20" font-weight="800">1. Ingest</text>
      <text x="30" y="94" fill="#697386" font-size="15">PDF, DOCX, XLSX,</text>
      <text x="30" y="118" fill="#697386" font-size="15">PPTX, URL, Markdown</text>
      <rect x="30" y="150" width="78" height="12" rx="6" fill="#5C8DFF"/>
      <rect x="30" y="174" width="126" height="12" rx="6" fill="#E4E8EF"/>
    </g>
    <g transform="translate(248 0)">
      <rect width="210" height="220" rx="24" fill="#FFFFFF"/>
      <text x="30" y="56" fill="#0B0E14" font-size="20" font-weight="800">2. Plan</text>
      <text x="30" y="94" fill="#697386" font-size="15">Audience, storyline,</text>
      <text x="30" y="118" fill="#697386" font-size="15">style, page rhythm</text>
      <rect x="30" y="150" width="126" height="12" rx="6" fill="#B68A3A"/>
      <rect x="30" y="174" width="92" height="12" rx="6" fill="#E4E8EF"/>
    </g>
    <g transform="translate(496 0)">
      <rect width="210" height="220" rx="24" fill="#FFFFFF"/>
      <text x="30" y="56" fill="#0B0E14" font-size="20" font-weight="800">3. Design</text>
      <text x="30" y="94" fill="#697386" font-size="15">Templates, charts,</text>
      <text x="30" y="118" fill="#697386" font-size="15">icons, image strategy</text>
      <rect x="30" y="150" width="104" height="12" rx="6" fill="#0B0E14"/>
      <rect x="30" y="174" width="138" height="12" rx="6" fill="#E4E8EF"/>
    </g>
    <g transform="translate(744 0)">
      <rect width="210" height="220" rx="24" fill="#FFFFFF"/>
      <text x="30" y="56" fill="#0B0E14" font-size="20" font-weight="800">4. Generate</text>
      <text x="30" y="94" fill="#697386" font-size="15">Sequential SVG pages</text>
      <text x="30" y="118" fill="#697386" font-size="15">with live preview</text>
      <rect x="30" y="150" width="144" height="12" rx="6" fill="#5CE1E6"/>
      <rect x="30" y="174" width="86" height="12" rx="6" fill="#E4E8EF"/>
    </g>
    <g transform="translate(992 0)">
      <rect width="210" height="220" rx="24" fill="#FFFFFF"/>
      <text x="30" y="56" fill="#0B0E14" font-size="20" font-weight="800">5. Verify</text>
      <text x="30" y="94" fill="#697386" font-size="15">Quality checks, chart</text>
      <text x="30" y="118" fill="#697386" font-size="15">calibration, annotations</text>
      <rect x="30" y="150" width="98" height="12" rx="6" fill="#0B0E14"/>
      <rect x="30" y="174" width="148" height="12" rx="6" fill="#E4E8EF"/>
    </g>
    <g transform="translate(1240 0)">
      <rect width="210" height="220" rx="24" fill="#0B0E14"/>
      <text x="30" y="56" fill="#FFFFFF" font-size="20" font-weight="800">6. Export</text>
      <text x="30" y="94" fill="#B7C0CD" font-size="15">Editable PPTX or</text>
      <text x="30" y="118" fill="#B7C0CD" font-size="15">premium HTML deck</text>
      <rect x="30" y="150" width="136" height="12" rx="6" fill="#F2D28A"/>
      <rect x="30" y="174" width="94" height="12" rx="6" fill="#273142"/>
    </g>
  </g>

  <g stroke="#A9B1BF" stroke-width="2" stroke-linecap="round" opacity="0.85">
    <path d="M306 342h28"/>
    <path d="M554 342h28"/>
    <path d="M802 342h28"/>
    <path d="M1050 342h28"/>
    <path d="M1298 342h28"/>
  </g>

  <g font-family="Inter, Helvetica, Arial, sans-serif">
    <rect x="90" y="548" width="1420" height="78" rx="24" fill="#FFFFFF" opacity="0.86"/>
    <text x="130" y="581" fill="#0B0E14" font-size="18" font-weight="800">Design principle</text>
    <text x="130" y="611" fill="#657080" font-size="17">The agent does not guess a deck in one pass. It locks the spec, generates page by page, then verifies output before handoff.</text>
  </g>
</svg>
