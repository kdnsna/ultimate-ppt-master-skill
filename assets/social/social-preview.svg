<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT Master social preview</title>
  <desc id="desc">Local-first AI presentation hub for agent-ready projects, editable PowerPoint, and Web Decks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.58" stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.48" stop-color="#10B981"/>
      <stop offset="1" stop-color="#EF5B3F"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#172033" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#172033" stroke-opacity="0.055"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect x="58" y="50" width="1164" height="540" rx="30" fill="#FFFFFF" opacity="0.76"/>

  <g font-family="Inter, Helvetica, Arial, sans-serif">
    <g transform="translate(92 82)">
      <rect width="384" height="48" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
      <circle cx="32" cy="24" r="8" fill="#2563EB"/>
      <circle cx="58" cy="24" r="8" fill="#10B981"/>
      <circle cx="84" cy="24" r="8" fill="#EF5B3F"/>
      <text x="112" y="30" fill="#526173" font-size="15" font-weight="850">AI presentation generator</text>

      <text x="0" y="134" fill="#172033" font-size="70" font-weight="950">Ultimate PPT Master</text>
      <text x="0" y="192" fill="#2563EB" font-size="34" font-weight="900">Local-first AI presentation hub</text>
      <text x="0" y="246" fill="#526173" font-size="24" font-weight="700">PDF / Word / PPTX / URL -> Agent-ready project</text>
      <text x="0" y="290" fill="#526173" font-size="24" font-weight="700">Editable PowerPoint + magazine-style Web Decks</text>
    </g>

    <g transform="translate(94 450)">
      <rect width="1092" height="82" rx="18" fill="#172033" filter="url(#shadow)"/>
      <rect x="30" y="31" width="180" height="20" rx="10" fill="url(#bar)"/>
      <text x="242" y="50" fill="#FFFFFF" font-size="22" font-weight="880">Web prepares the brief - Bridge writes local files - Agent Skill handles quality</text>
    </g>

    <g transform="translate(828 124)" filter="url(#shadow)">
      <rect width="326" height="244" rx="18" fill="#FFFFFF" stroke="#D8E0EA"/>
      <rect x="24" y="24" width="278" height="42" rx="10" fill="#EFF6FF"/>
      <text x="44" y="51" fill="#2563EB" font-size="17" font-weight="900">Reusable starter packs</text>
      <text x="30" y="104" fill="#172033" font-size="21" font-weight="920">Consulting proposal</text>
      <text x="30" y="143" fill="#172033" font-size="21" font-weight="920">Executive business review</text>
      <text x="30" y="182" fill="#172033" font-size="21" font-weight="920">Product pitch</text>
      <text x="30" y="221" fill="#172033" font-size="21" font-weight="920">Tech trend web deck</text>
    </g>
  </g>
</svg>
