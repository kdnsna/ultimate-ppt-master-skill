<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT Master 中文社交预览</title>
  <desc id="desc">把真实资料变成可继续修改的原生 PowerPoint 与 Web Deck。</desc>

  <rect width="1280" height="640" fill="#F6F3ED"/>
  <rect x="54" y="48" width="1172" height="544" rx="28" fill="#FFFDF8" stroke="#D9D4C9"/>
  <rect x="54" y="56" width="9" height="528" rx="4.5" fill="#1D4ED8"/>

  <g font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif">
    <text x="96" y="98" fill="#1D4ED8" font-size="18" font-weight="600">ULTIMATE PPT MASTER · LOCAL-FIRST AI PRESENTATION</text>
    <line x1="96" y1="122" x2="1184" y2="122" stroke="#171714" stroke-opacity="0.28"/>

    <g font-family="Noto Serif SC, SimSun, serif" fill="#171714" font-weight="400">
      <text x="96" y="232" font-size="74">把真实资料</text>
      <text x="96" y="326" font-size="74">变成可编辑的</text>
      <text x="96" y="420" font-size="74" fill="#1D4ED8">PowerPoint</text>
    </g>
    <text x="100" y="470" fill="#64645F" font-size="22">Editable PPTX · Web Deck · 本地 Agent 工作流</text>

    <g transform="translate(810 168)">
      <rect width="340" height="116" rx="22" fill="#E8EEF9" stroke="#CBD8F2"/>
      <text x="22" y="38" fill="#1D4ED8" font-size="16" font-family="IBM Plex Mono, monospace">01 / FORMAL DELIVERY</text>
      <text x="22" y="82" fill="#171714" font-size="31" font-weight="600">可编辑 PPTX</text>

      <rect y="132" width="340" height="116" rx="22" fill="#F7E8E2" stroke="#EFC9BA"/>
      <text x="22" y="170" fill="#D9573B" font-size="16" font-family="IBM Plex Mono, monospace">02 / EDITORIAL STORY</text>
      <text x="22" y="214" fill="#171714" font-size="31" font-weight="600">AI Web Deck</text>
    </g>

    <line x1="96" y1="520" x2="1184" y2="520" stroke="#171714"/>
    <text x="96" y="558" fill="#171714" font-size="19" font-weight="500">输入  →  故事板  →  生成  →  质量复核</text>
    <text x="1184" y="558" text-anchor="end" fill="#73866C" font-size="17" font-weight="600">先看成品，再看交付证据</text>
  </g>
