name: Release Desktop App

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "GitHub release tag, for example v2.1.0"
        required: true
  release:
    types: [published]

permissions:
  contents: write

jobs:
  macos-app:
    name: Build macOS Homebrew artifact
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install native dependencies
        run: brew install cairo pkg-config

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci

      - name: Package Homebrew release zip
        run: npm run package:desktop:homebrew

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: gh release upload "$RELEASE_TAG" dist/release/* --clobber
